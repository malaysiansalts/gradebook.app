<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Gradebook Portal - Local Dark Mode</title>
  <style>
    :root {
      --bg-space: #090d16;
      --card-bg: #131b2e;
      --brand-primary: #f8fafc;
      --brand-accent: #3b82f6;
      --brand-accent-hover: #1d4ed8;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-soft: #1e293b;
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-space);
      color: var(--text-main);
      margin: 0;
      padding: 0;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent);
    }
    
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .auth-header { text-align: center; margin-bottom: 24px; }
    .auth-header h2 { font-size: 26px; font-weight: 700; color: var(--brand-primary); margin: 0; }
    .auth-header p { margin: 6px 0 0 0; color: var(--text-muted); font-size: 14px; }

    .dashboard-wrapper { max-width: 1200px; margin: 40px auto; padding: 0 24px; animation: fadeInUp 0.5s ease-out; }
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: var(--text-muted); }
    input, select {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      box-sizing: border-box;
      background-color: #0f172a;
      font-size: 14px;
      color: #ffffff;
      transition: all 0.15s ease-in-out;
    }
    input:focus, select:focus { outline: none; border-color: var(--brand-accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25); }

    button {
      background: var(--brand-accent);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    button:hover { background: var(--brand-accent-hover); transform: translateY(-1px); }
    .secondary-btn { background: none; color: var(--text-muted); border: 1px solid var(--border-soft); width: 100%; margin-top: 10px; }
    .secondary-btn:hover { background: #1e293b; color: #ffffff; }

    .grid-container { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
    @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }

    .card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 32px; }
    .row-item-3col { display: grid; grid-template-columns: 3fr 2fr 40px; gap: 16px; align-items: center; margin-bottom: 12px; }
    
    .remove-btn { background: none; color: var(--text-muted); font-size: 18px; border: none; cursor: pointer; }
    .remove-btn:hover { color: #ef4444; }
    .hidden { display: none !important; }
    .scale-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  </style>
</head>
<body>

  <div id="auth-view" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2 id="auth-title">Create Account</h2>
        <p>Access Local Grade Analytics Terminal</p>
      </div>

      <div id="auth-error" style="color: #ef4444; font-weight: 600; font-size: 13px; text-align: center; margin-bottom: 16px;" class="hidden">Authentication processing error. Check parameters.</div>

      <form onsubmit="event.preventDefault(); executeAuth();">
        <label>Email Address</label>
        <input type="email" id="auth-email" placeholder="you@academy.com" required>
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••••••" required>
        <button type="submit" style="width:100%; margin-top: 8px;">Authenticate</button>
      </form>
      
      <button class="secondary-btn" onclick="toggleAuth()">Switch Login / Sign Up</button>
    </div>
  </div>

  <div id="app-view" class="dashboard-wrapper hidden">
    <div class="top-nav">
      <div>
        <h1 style="margin:0; font-size: 28px;">Workspace Matrix</h1>
        <p id="current-user-tag" style="color: var(--text-muted); font-size:14px; margin:4px 0 0 0;"></p>
      </div>
      <button onclick="logOutUser()" style="background: #1e293b; border: 1px solid var(--border-soft);">Disconnect Session</button>
    </div>

    <div class="card" style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
      <div style="flex: 120;">
        <label>Active Subject Course</label>
        <select id="class-dropdown" onchange="switchActiveClass()"></select>
      </div>
      <div style="flex: 100;">
        <label>Rename Course</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="rename-class-input" style="margin-bottom:0;">
          <button onclick="renameCurrentSubject()" style="background: #334155;">Rename</button>
        </div>
      </div>
      <div style="display: flex; gap: 8px; align-items: flex-end;">
        <button onclick="deleteCurrentClassChannel()" style="background: #ef4444; white-space: nowrap;">Delete Class</button>
        <input type="text" id="new-class-input" placeholder="New Course Code" style="width:160px; margin-bottom:0;">
        <button onclick="createNewClassChannel()">+ Add Class</button>
      </div>
    </div>

    <div class="grid-container">
      <div>
        <div class="card">
          <h3>1. Category Weights Assignment</h3>
          <div id="category-rows-hook"></div>
          <button onclick="appendBlankCategoryRow()" style="background:#1e293b; margin-top:10px;">+ Add Category</button>
        </div>

        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">2. Log Entries</h3>
            <select id="category-filter-dropdown" onchange="buildUiElementsFromMemory()" style="width:200px; margin-bottom:0;"></select>
          </div>
          <div id="assignment-rows-hook"></div>
          <div style="display:flex; gap:12px; margin-top:20px;">
            <button onclick="appendBlankAssignmentRow()" style="background:#1e293b;">+ Add Assignment</button>
            <button onclick="saveAllCurrentDataToServer()">Save Configuration Matrix</button>
          </div>
        </div>

        <div class="card">
          <h3>3. Target Test/Exam Grade Needed Calculator</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
            <div>
              <label>Target Class Grade %</label>
              <input type="number" id="target-class-grade" value="90">
            </div>
            <div>
              <label>Upcoming Test Category</label>
              <select id="target-test-category" style="margin-bottom:0;"></select>
            </div>
            <div style="display:flex; align-items:flex-end;">
              <button onclick="calculateRequiredExamScore()" style="width:100%; margin-bottom:16px;">Calculate Needed Grade</button>
            </div>
          </div>
          <p id="target-result-badge" style="color:var(--brand-accent); font-weight:bold; text-align:center; margin-top:10px;"></p>
        </div>
      </div>

      <div>
        <div class="card" style="text-align:center; background: #0f172a; border-color: var(--brand-accent);">
          <span style="color: var(--text-muted); font-size:14px;">Weighted Matrix Yield</span>
          <h1 id="score-pct-badge" style="font-size:56px; margin:10px 0; color:#ffffff;">0.0%</h1>
          <div id="score-letter-badge" style="font-weight:bold; font-size:24px; color: var(--brand-accent);">F</div>
        </div>

        <div class="card">
          <h3>Grading Threshold Mapping Floors</h3>
          <div class="scale-matrix">
            <div><label>A+</label><input type="number" id="sc-Aplus" value="97"></div>
            <div><label>A</label><input type="number" id="sc-A" value="93"></div>
            <div><label>A-</label><input type="number" id="sc-Aminus" value="90"></div>
            <div><label>B+</label><input type="number" id="sc-Bplus" value="87"></div>
            <div><label>B</label><input type="number" id="sc-B" value="83"></div>
            <div><label>B-</label><input type="number" id="sc-Bminus" value="80"></div>
          </div>
          <button onclick="saveScaleToServer()" style="width:100%; background:#1e293b; margin-top:15px;">Sync Calibration Scale</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentAuthMode = 'register';
    let globalScale = {};
    let globalClasses = {};
    let activeClassName = "";

    function toggleAuth() {
      const title = document.getElementById('auth-title');
      currentAuthMode = (currentAuthMode === 'register') ? 'login' : 'register';
      title.innerText = (currentAuthMode === 'login') ? 'Log In' : 'Create Account';
    }

    async function checkSession() {
      const res = await fetch('/api/me');
      if(res.ok) {
        const data = await res.json();
        document.getElementById('current-user-tag').innerText = `Active Session identity: ${data.email}`;
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('app-view').classList.remove('hidden');
        await loadBackendData();
      }
    }

    async function executeAuth() {
      document.getElementById('auth-error').classList.add('hidden');
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const res = await fetch(`/api/${currentAuthMode}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if(res.ok) window.location.reload();
      else document.getElementById('auth-error').classList.remove('hidden');
    }

    async function logOutUser() { await fetch('/api/logout', { method: 'POST' }); window.location.reload(); }

    async function loadBackendData() {
      const res = await fetch('/api/userdata');
      if(res.ok) {
        const payload = await res.json();
        globalScale = payload.gradingScale || {};
        globalClasses = payload.classes || {};
        Object.keys(globalScale).forEach(key => {
          const el = document.getElementById(`sc-${key}`); if(el) el.value = globalScale[key];
        });
        populateClassDropdown();
      }
    }

    function populateClassDropdown() {
      const dropdown = document.getElementById('class-dropdown');
      dropdown.innerHTML = '';
      const keys = Object.keys(globalClasses);
      if(keys.length === 0) {
        globalClasses["General Class"] = { categories: [{name:"Exams", weight: 100}], assignments: [] };
        keys.push("General Class");
      }
      keys.forEach(key => dropdown.innerHTML += `<option value="${key}">${key}</option>`);
      if (!activeClassName || !globalClasses[activeClassName]) activeClassName = keys[0];
      dropdown.value = activeClassName;
      document.getElementById('rename-class-input').value = activeClassName;
      populateCategoryFilters();
      buildUiElementsFromMemory();
    }

    function populateCategoryFilters() {
      const currentClass = globalClasses[activeClassName] || { categories: [] };
      const filterSelect = document.getElementById('category-filter-dropdown');
      const targetCalcSelect = document.getElementById('target-test-category');
      const prev = filterSelect.value;
      
      filterSelect.innerHTML = '<option value="ALL">Show All Categories</option>';
      targetCalcSelect.innerHTML = '';
      currentClass.categories.forEach(c => {
        filterSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`;
        targetCalcSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`;
      });
      filterSelect.value = (prev && filterSelect.querySelector(`option[value="${prev}"]`)) ? prev : "ALL";
    }

    function parseScoreString(str) {
      if (!str) return 100;
      const clean = str.toString().trim();
      if (clean.includes('/')) {
        const parts = clean.split('/');
        return ((parseFloat(parts[0]) || 0) / (parseFloat(parts[1]) || 1)) * 100;
      }
      return parseFloat(clean) || 0;
    }

    function buildUiElementsFromMemory() {
      const targetClass = globalClasses[activeClassName] || { categories: [], assignments: [] };
      const catHook = document.getElementById('category-rows-hook');
      catHook.innerHTML = '';
      targetClass.categories.forEach((cat, index) => {
        catHook.innerHTML += `
          <div class="row-item-3col cat-data-row">
            <input type="text" value="${cat.name}" class="cat-name-input" oninput="readUiStateIntoMemory()">
            <input type="number" value="${cat.weight}" class="cat-weight-input" oninput="readUiStateIntoMemory()">
            <button class="remove-btn" onclick="globalClasses[activeClassName].categories.splice(${index},1); populateCategoryFilters(); buildUiElementsFromMemory()">✕</button>
          </div>`;
      });

      const filterSelection = document.getElementById('category-filter-dropdown').value;
      const assignHook = document.getElementById('assignment-rows-hook');
      assignHook.innerHTML = '';
      targetClass.assignments.forEach((asm, index) => {
        if (filterSelection !== "ALL" && asm.category !== filterSelection) return;
        let selectOptions = '';
        targetClass.categories.forEach(c => selectOptions += `<option value="${c.name}" ${asm.category === c.name ? 'selected' : ''}>${c.name}</option>`);
        assignHook.innerHTML += `
          <div class="row-item-3col asm-data-row" data-index="${index}">
            <input type="text" value="${asm.name}" class="asm-name-input" oninput="readUiStateIntoMemory()">
            <div style="display:flex; gap: 8px;">
              <select class="asm-cat-select" onchange="readUiStateIntoMemory()">${selectOptions}</select>
              <input type="text" value="${asm.scoreStr !== undefined ? asm.scoreStr : '100'}" class="asm-score-input" oninput="readUiStateIntoMemory()">
            </div>
            <button class="remove-btn" onclick="globalClasses[activeClassName].assignments.splice(${index},1); buildUiElementsFromMemory()">✕</button>
          </div>`;
      });
      runCalculations();
    }

    function readUiStateIntoMemory() {
      const currentClass = globalClasses[activeClassName];
      if(!currentClass) return;
      document.querySelectorAll('.cat-data-row').forEach((row, idx) => {
        if(currentClass.categories[idx]) {
          currentClass.categories[idx].name = row.querySelector('.cat-name-input').value;
          currentClass.categories[idx].weight = parseFloat(row.querySelector('.cat-weight-input').value) || 0;
        }
      });
      document.querySelectorAll('.asm-data-row').forEach(row => {
        const targetIdx = parseInt(row.getAttribute('data-index'));
        if(currentClass.assignments[targetIdx]) {
          currentClass.assignments[targetIdx].name = row.querySelector('.asm-name-input').value;
          currentClass.assignments[targetIdx].category = row.querySelector('.asm-cat-select').value;
          currentClass.assignments[targetIdx].scoreStr = row.querySelector('.asm-score-input').value;
        }
      });
      runCalculations();
    }

    function runCalculations() {
      const currentClass = globalClasses[activeClassName];
      if (!currentClass) return;
      let overallScore = 0, totalValidWeight = 0;
      currentClass.categories.forEach(cat => {
        const matches = currentClass.assignments.filter(a => a.category === cat.name);
        if (matches.length > 0) {
          let sum = matches.reduce((acc, m) => acc + parseScoreString(m.scoreStr), 0);
          overallScore += (sum / matches.length) * (cat.weight / 100);
          totalValidWeight += cat.weight;
        }
      });
      let finalNormalizedPct = totalValidWeight > 0 ? (overallScore / (totalValidWeight / 100)) : 0;
      document.getElementById('score-pct-badge').innerText = `${finalNormalizedPct.toFixed(1)}%`;
      
      let letter = 'F';
      const sortedKeys = Object.keys(globalScale).sort((a,b) => globalScale[b] - globalScale[a]);
      for (let k of sortedKeys) {
        if (finalNormalizedPct >= globalScale[k]) {
          letter = k.replace('plus','+').replace('minus','-');
          break;
        }
      }
      document.getElementById('score-letter-badge').innerText = letter;
    }

    function calculateRequiredExamScore() {
      const targetGrade = parseFloat(document.getElementById('target-class-grade').value) || 0;
      const targetCatName = document.getElementById('target-test-category').value;
      const currentClass = globalClasses[activeClassName];
      if (!currentClass || !targetCatName) return;

      let totalWeight = currentClass.categories.reduce((acc, c) => acc + c.weight, 0);
      if(totalWeight === 0) return;

      let currentContribution = 0, targetCatWeight = 0;
      currentClass.categories.forEach(cat => {
        if (cat.name === targetCatName) {
          targetCatWeight = cat.weight;
        } else {
          const matches = currentClass.assignments.filter(a => a.category === cat.name);
          const catAvg = matches.length > 0 ? (matches.reduce((acc, curr) => acc + parseScoreString(curr.scoreStr), 0) / matches.length) : 100;
          currentContribution += catAvg * (cat.weight / 100);
        }
      });

      const matches = currentClass.assignments.filter(a => a.category === targetCatName);
      const requiredCatAvg = ((targetGrade * (totalWeight / 100)) - currentContribution) / (targetCatWeight / 100);
      let requiredTestScore = matches.length === 0 ? requiredCatAvg : (requiredCatAvg * (matches.length + 1)) - matches.reduce((acc, curr) => acc + parseScoreString(curr.scoreStr), 0);

      document.getElementById('target-result-badge').innerText = requiredTestScore <= 0 ? "Goal met! You can score a 0.0% safely." : `Required score on next evaluation: ${requiredTestScore.toFixed(1)}%`;
    }

    async function syncDataWithDatabase() {
      await fetch('/api/userdata', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ classes: globalClasses })
      });
    }

    async function saveAllCurrentDataToServer() {
      readUiStateIntoMemory();
      await syncDataWithDatabase();
      alert("Matrix configuration committed successfully!");
      buildUiElementsFromMemory();
    }

    function appendBlankCategoryRow() { globalClasses[activeClassName].categories.push({ name: "New Category", weight: 0 }); populateCategoryFilters(); buildUiElementsFromMemory(); }
    function appendBlankAssignmentRow() { const cats = globalClasses[activeClassName].categories; globalClasses[activeClassName].assignments.push({ name: "New Item", category: cats.length > 0 ? cats[0].name : "Exams", scoreStr: "100" }); buildUiElementsFromMemory(); }
    function createNewClassChannel() { const name = document.getElementById('new-class-input').value.trim(); if(name) { globalClasses[name] = { categories: [{ name: "Exams", weight: 100 }], assignments: [] }; activeClassName = name; populateClassDropdown(); } }
    function switchActiveClass() { activeClassName = document.getElementById('class-dropdown').value; populateCategoryFilters(); buildUiElementsFromMemory(); }
    function renameCurrentSubject() { const n = document.getElementById('rename-class-input').value.trim(); if(n && !globalClasses[n]) { globalClasses[n] = globalClasses[activeClassName]; delete globalClasses[activeClassName]; activeClassName = n; populateClassDropdown(); } }
    async function deleteCurrentClassChannel() { if(confirm("Delete class?")) { delete globalClasses[activeClassName]; activeClassName = ""; await syncDataWithDatabase(); populateClassDropdown(); } }
    async function saveScaleToServer() { Object.keys(globalScale).forEach(k => { const el = document.getElementById(`sc-${k}`); if(el) globalScale[k] = parseFloat(el.value); }); await fetch('/api/userdata', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ gradingScale: globalScale }) }); runCalculations(); }

    window.onload = checkSession;
  </script>
</body>
</html>
