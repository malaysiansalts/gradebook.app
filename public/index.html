<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Calc & Tracker</title>
  <style>
    /* ----------------------------------------------------
       DESIGN SYSTEM & VARIABLES
       ---------------------------------------------------- */
    :root {
      --bg-main: #0b0f19;
      --panel-bg: rgba(22, 30, 49, 0.75);
      --panel-border: rgba(255, 255, 255, 0.08);
      --panel-border-focus: rgba(59, 130, 246, 0.5);
      
      --accent-blue: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.25);
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-dark: #64748b;
      --input-bg: #0d1321;
      
      --radius-xl: 16px;
      --radius-lg: 12px;
      --radius-md: 8px;
      --radius-sm: 4px;
      
      --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --font-stack: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* ----------------------------------------------------
       GLOBAL RESETS & BACKGROUND
       ---------------------------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-stack);
      background-color: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative Dynamic Orbs for Visual Depth */
    body::before, body::after {
      content: "";
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(100px);
      opacity: 0.4;
    }
    body::before {
      top: -10%;
      right: -5%;
      background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, transparent 70%);
    }
    body::after {
      bottom: -10%;
      left: -5%;
      background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
    }

    /* ----------------------------------------------------
       ANIMATIONS
       ---------------------------------------------------- */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes toastInOut {
      0% { transform: translate(-50%, -50px); opacity: 0; }
      15% { transform: translate(-50%, 24px); opacity: 1; }
      85% { transform: translate(-50%, 24px); opacity: 1; }
      100% { transform: translate(-50%, -50px); opacity: 0; }
    }

    @keyframes cardPulse {
      0% { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px var(--panel-border); }
      50% { box-shadow: 0 4px 25px rgba(59,130,246,0.15), 0 0 8px 1px rgba(59,130,246,0.2); }
      100% { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px var(--panel-border); }
    }

    /* ----------------------------------------------------
       NOTIFICATIONS & TOASTS
       ---------------------------------------------------- */
    #toast-notification {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: #ffffff;
      padding: 14px 32px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
    }
    .show-toast { animation: toastInOut 3.5s ease-in-out forwards; }

    /* ----------------------------------------------------
       CUSTOM VIBE MODAL DIALOG
       ---------------------------------------------------- */
    .vibe-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 8, 16, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 11000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .vibe-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .vibe-modal-card {
      background: var(--panel-bg);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-xl);
      padding: 32px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(239, 68, 68, 0.05);
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
    }
    .vibe-modal-overlay.active .vibe-modal-card {
      transform: translateY(0);
    }
    .vibe-modal-card h3 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #ffffff;
    }
    .vibe-modal-card p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .vibe-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* ----------------------------------------------------
       AUTH COMPONENT STYLING
       ---------------------------------------------------- */
    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .auth-header h2 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* ----------------------------------------------------
       UI REUSABLE STYLING (INPUTS, DROPDOWNS, BUTTONS)
       ---------------------------------------------------- */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      background-color: var(--input-bg);
      border: 1px solid var(--panel-border);
