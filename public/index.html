<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Gradebook Portal - Dark Mode</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-space: #090d16;
      --card-bg: #131b2e;
      --brand-primary: #f8fafc;
      --brand-accent: #3b82f6;
      --brand-accent-hover: #1d4ed8;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-soft: #1e293b;
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-space);
      color: var(--text-main);
      margin: 0;
      padding: 0;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent);
    }
    
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .auth-header { text-align: center; margin-bottom: 24px; }
    .auth-header h2 { font-size: 26px; font-weight: 700; color: var(--brand-primary); margin: 0; }
    .auth-header p { margin: 6px 0 0 0; color: var(--text-muted); font-size: 14px; }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: #1e293b;
      border: 1px solid var(--border-soft);
      color: #ffffff;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s ease-in-out;
    }
    .social-btn:hover { background: #334155; transform: translateY(-1px); }
    .social-btn img { width: 18px; height: 18px; }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 20px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-soft); }
    .divider:not(:empty)::before { margin-right: 1em; }
    .divider:not(:empty)::after { margin-left: 1em; }

    .dashboard-wrapper { max-width: 1200px; margin: 40px auto; padding: 0 24px; animation: fadeInUp 0.5s ease-out; }
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: var(--text-muted); }
    input, select {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      box-sizing: border-box;
      background-color: #0f172a;
      font-size: 14px;
      color: #ffffff;
      transition: all 0.15s ease-in-out;
    }
    input:focus, select:focus { outline: none; border-color: var(--brand-accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25); }

    button {
      background: var(--brand-accent);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    button:hover { background: var(--brand-accent-hover); transform: translateY(-1px); }

    .grid-container { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
    @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }

    .card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 32px; }
    .row-item-3col { display: grid; grid-template-columns: 3fr 2fr 40px; gap: 16px; align-items: center; margin-bottom: 12px; }
    
    .remove-btn { background: none; color: var(--text-muted); font-size: 18px; border: none; cursor: pointer; }
    .remove-btn:hover { color: #ef4444; }
    .hidden { display: none !important; }
    .scale-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  </style>
</head>
<body>

  <div id="auth-view" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2 id="auth-title">Sign In Portal</h2>
        <p>Access Cloud-Synced Grade Analytics</p>
      </div>

      <button class="social-btn" onclick="loginWithOAuth('google')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
        Continue with Google
      </button>
      <button class="social-btn" onclick="loginWithOAuth('apple')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" style="filter: invert(1);">
        Continue with Apple
      </button>

      <div class="divider">or credentials</div>

      <form onsubmit="event.preventDefault(); handleEmailAuth();">
        <label>Email Address</label>
        <input type="email" id="auth-email" placeholder="you@academy.com" required>
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••••••" required>
        <button type="submit" style="width:100%; margin-top: 8px;">Login / Sign Up</button>
      </form>
    </div>
  </div>

  <div id="app-view" class="dashboard-wrapper hidden">
    <div class="top-nav">
      <div>
        <h1 style="margin:0; font-size: 28px;">Workspace Matrix</h1>
        <p id="user-tag" style="color: var(--text-muted); font-size:14px; margin:4px 0 0 0;"></p>
      </div>
      <button onclick="handleLogout()" style="background: #1e293b; border: 1px solid var(--border-soft);">Disconnect Session</button>
    </div>

    <div class="card" style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
      <div style="flex: 120;">
        <label>Active Subject Course</label>
        <select id="class-dropdown" onchange="switchActiveClass()"></select>
      </div>
      <div style="flex: 100;">
        <label>Rename Course</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="rename-class-input" style="margin-bottom:0;">
          <button onclick="renameCurrentSubject()" style="background: #334155;">Rename</button>
        </div>
      </div>
      <div>
        <input type="text" id="new-class-input" placeholder="New Course Code" style="width:160px; margin-bottom:0;">
        <button onclick="createNewClassChannel()">+ Add Class</button>
      </div>
    </div>

    <div class="grid-container">
      <div>
        <div class="card">
          <h3>1. Category Weights Assignment</h3>
          <div id="category-rows-hook"></div>
          <button onclick="appendBlankCategoryRow()" style="background:#1e293b; margin-top:10px;">+ Add Category</button>
        </div>

        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">2. Log Entries</h3>
            <select id="category-filter-dropdown" onchange="buildUiElementsFromMemory()" style="width:200px; margin-bottom:0;"></select>
          </div>
          <div id="assignment-rows-hook"></div>
          <div style="display:flex; gap:12px; margin-top:20px;">
            <button onclick="appendBlankAssignmentRow()" style="background:#1e293b;">+ Add Assignment</button>
            <button onclick="saveAllCurrentDataToServer()">Save Configuration Matrix</button>
          </div>
        </div>

        <div class="card">
          <h3>3. Target Test/Exam Grade Needed Calculator</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
            <div>
              <label>Target Class Grade %</label>
              <input type="number" id="target-class-grade" value="90">
            </div>
            <div>
              <label>Upcoming Test Category</label>
              <select id="target-test-category" style="margin-bottom:0;"></select>
            </div>
            <div style="display:flex; align-items:flex-end;">
              <button onclick="calculateRequiredExamScore()" style="width:100%; margin-bottom:16px;">Calculate Needed Grade</button>
            </div>
          </div>
          <p id="target-result-badge" style="color:var(--brand-accent); font-weight:bold; text-align:center; margin-top:10px;"></p>
        </div>
      </div>

      <div>
        <div class="card" style="text-align:center; background: #0f172a; border-color: var(--brand-accent);">
          <span style="color: var(--text-muted); font-size:14px;">Weighted Matrix Yield</span>
          <h1 id="score-pct-badge" style="font-size:56px; margin:10px 0; color:#ffffff;">0.0%</h1>
          <div id="score-letter-badge" style="font-weight:bold; font-size:24px; color: var(--brand-accent);">F</div>
        </div>

        <div class="card">
          <h3>Grading Threshold Mapping Floors</h3>
          <div class="scale-matrix">
            <div><label>A+</label><input type="number" id="sc-Aplus" value="97"></div>
            <div><label>A</label><input type="number" id="sc-A" value="93"></div>
            <div><label>A-</label><input type="number" id="sc-Aminus" value="90"></div>
            <div><label>B+</label><input type="number" id="sc-Bplus" value="87"></div>
            <div><label>B</label><input type="number" id="sc-B" value="83"></div>
            <div><label>B-</label><input type="number" id="sc-Bminus" value="80"></div>
          </div>
          <button onclick="saveScaleToServer()" style="width:100%; background:#1e293b; margin-top:15px;">Sync Calibration Scale</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialize standard clients
    const SUPABASE_URL = "https://YOUR_SUPABASE_PROJECT_URL.supabase.co"; 
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_PUBLIC_KEY";
    const supabase = netlify = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    let globalScale = { "Aplus": 97, "A": 93, "Aminus": 90, "Bplus": 87, "B": 83, "Bminus": 80 };
    let globalClasses = {};
    let activeClassName = "";

    async function checkAuthSession() {
      if(!supabase) return;
      const { data: { session } } = await supabase.auth.getSession();
      if(session) {
        document.getElementById('user-tag').innerText = `Active Profile: ${session.user.email}`;
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('app-view').classList.remove('hidden');
        await loadUserDataPayload(session.user.id);
      }
    }

    async function loginWithOAuth(providerName) {
      if(!supabase) { alert("Please complete Supabase configurations initializing keys."); return; }
      await supabase.auth.signInWithOAuth({
        provider: providerName,
        options: { redirectTo: window.location.origin }
      });
    }

    async function handleEmailAuth() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      // Tries signing up; if exists, logs in automatically
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error && error.message.includes("already registered")) {
        await supabase.auth.signInWithPassword({ email, password });
      }
      window.location.reload();
    }

    async function handleLogout() { await supabase.auth.signOut(); window.location.reload(); }

    // Unified client-side storage management mappings
    async function loadUserDataPayload(uid) {
      const savedData = localStorage.getItem(`gradebook_${uid}`);
      if(savedData) {
        const payload = JSON.parse(savedData);
        globalClasses = payload.classes || {};
        globalScale = payload.gradingScale || globalScale;
      }
      populateClassDropdown();
    }

    function populateClassDropdown() {
      const dropdown = document.getElementById('class-dropdown');
      dropdown.innerHTML = '';
      const keys = Object.keys(globalClasses);
      if(keys.length === 0) {
        globalClasses["General Semester Class"] = { categories: [{name:"Exams", weight: 60}], assignments: [] };
        keys.push("General Semester Class");
      }
      keys.forEach(k => dropdown.innerHTML += `<option value="${k}">${k}</option>`);
      activeClassName = keys[0];
      dropdown.value = activeClassName;
      buildUiElementsFromMemory();
    }

    function parseScoreString(str) {
      if (!str) return 100;
      const clean = str.toString().trim();
      if (clean.includes('/')) {
        const parts = clean.split('/');
        return ((parseFloat(parts[0]) || 0) / (parseFloat(parts[1]) || 1)) * 100;
      }
      return parseFloat(clean) || 0;
    }

    function buildUiElementsFromMemory() {
      const currentClass = globalClasses[activeClassName] || { categories: [], assignments: [] };
      
      // Sync Filters
      const filter = document.getElementById('category-filter-dropdown');
      const targetCat = document.getElementById('target-test-category');
      filter.innerHTML = '<option value="ALL">All Pools</option>';
      targetCat.innerHTML = '';
      currentClass.categories.forEach(c => {
        filter.innerHTML += `<option value="${c.name}">${c.name}</option>`;
        targetCat.innerHTML += `<option value="${c.name}">${c.name}</option>`;
      });

      // Render Active Allocations Rows
      const catHook = document.getElementById('category-rows-hook');
      catHook.innerHTML = '';
      currentClass.categories.forEach((cat, idx) => {
        catHook.innerHTML += `
          <div class="row-item-3col cat-data-row">
            <input type="text" value="${cat.name}" class="cat-name-input" oninput="readUiStateIntoMemory()">
            <input type="number" value="${cat.weight}" class="cat-weight-input" oninput="readUiStateIntoMemory()">
            <button class="remove-btn" onclick="globalClasses[activeClassName].categories.splice(${idx},1); buildUiElementsFromMemory()">✕</button>
          </div>`;
      });

      // Render Selected Assignments Logger list bound to Category placement select
      const assignHook = document.getElementById('assignment-rows-hook');
      assignHook.innerHTML = '';
      currentClass.assignments.forEach((asm, idx) => {
        if(filter.value !== "ALL" && asm.category !== filter.value) return;
        let opts = "";
        currentClass.categories.forEach(c => opts += `<option value="${c.name}" ${asm.category===c.name?'selected':''}>${c.name}</option>`);
        assignHook.innerHTML += `
          <div class="row-item-3col asm-data-row" data-index="${idx}">
            <input type="text" value="${asm.name}" class="asm-name-input" oninput="readUiStateIntoMemory()">
            <div style="display:flex; gap:8px;">
              <select class="asm-cat-select" onchange="readUiStateIntoMemory()">${opts}</select>
              <input type="text" value="${asm.scoreStr || '100'}" class="asm-score-input" oninput="readUiStateIntoMemory()">
            </div>
            <button class="remove-btn" onclick="globalClasses[activeClassName].assignments.splice(${idx},1); buildUiElementsFromMemory()">✕</button>
          </div>`;
      });
      runCalculations();
    }

    function readUiStateIntoMemory() {
      const currentClass = globalClasses[activeClassName];
      if(!currentClass) return;
      
      const catRows = document.querySelectorAll('.cat-data-row');
      currentClass.categories = [];
      catRows.forEach(row => {
        currentClass.categories.push({
          name: row.querySelector('.cat-name-input').value,
          weight: parseFloat(row.querySelector('.cat-weight-input').value) || 0
        });
      });

      const asmRows = document.querySelectorAll('.asm-data-row');
      asmRows.forEach(row => {
        const idx = parseInt(row.getAttribute('data-index'));
        if(currentClass.assignments[idx]) {
          currentClass.assignments[idx].name = row.querySelector('.asm-name-input').value;
          currentClass.assignments[idx].category = row.querySelector('.asm-cat-select').value;
          currentClass.assignments[idx].scoreStr = row.querySelector('.asm-score-input').value;
        }
      });
      runCalculations();
    }

    function runCalculations() {
      const currentClass = globalClasses[activeClassName];
      if(!currentClass) return;

      let overallScore = 0, totalValidWeight = 0;
      currentClass.categories.forEach(cat => {
        const matches = currentClass.assignments.filter(a => a.category === cat.name);
        if(matches.length > 0) {
          let sum = matches.reduce((acc, curr) => acc + parseScoreString(curr.scoreStr), 0);
          overallScore += (sum / matches.length) * (cat.weight / 100);
          totalValidWeight += cat.weight;
        }
      });

      let finalNormalizedPct = totalValidWeight > 0 ? (overallScore / (totalValidWeight / 100)) : 0;
      document.getElementById('score-pct-badge').innerText = `${finalNormalizedPct.toFixed(1)}%`;
    }

    async function saveAllCurrentDataToServer() {
      const { data: { user } } = await supabase.auth.getUser();
      if(user) {
        localStorage.setItem(`gradebook_${user.id}`, JSON.stringify({ classes: globalClasses, gradingScale: globalScale }));
        alert("Encrypted cloud sync status saved safely to modern layout bounds!");
      }
    }

    function appendBlankCategoryRow() { globalClasses[activeClassName].categories.push({name:"New Pool", weight:0}); buildUiElementsFromMemory(); }
    function appendBlankAssignmentRow() { globalClasses[activeClassName].assignments.push({name:"Evaluation", category: globalClasses[activeClassName].categories[0]?.name || "Exams", scoreStr: "100"}); buildUiElementsFromMemory(); }

    window.onload = checkAuthSession;
  </script>
</body>
</html>
