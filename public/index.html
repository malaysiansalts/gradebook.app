<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Calc & Tracker</title>
  <style>
    /* ----------------------------------------------------
       DESIGN SYSTEM & VARIABLES
       ---------------------------------------------------- */
    :root {
      --bg-main: #0b0f19;
      --panel-bg: rgba(22, 30, 49, 0.75);
      --panel-border: rgba(255, 255, 255, 0.08);
      --panel-border-focus: rgba(59, 130, 246, 0.5);
      
      --accent-blue: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.25);
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-dark: #64748b;
      --input-bg: #0d1321;
      
      --radius-xl: 16px;
      --radius-lg: 12px;
      --radius-md: 8px;
      --radius-sm: 4px;
      
      --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --font-stack: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* ----------------------------------------------------
       GLOBAL RESETS & BACKGROUND
       ---------------------------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-stack);
      background-color: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
      position: relative;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(100px);
      opacity: 0.4;
    }
    body::before {
      top: -10%;
      right: -5%;
      background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, transparent 70%);
    }
    body::after {
      bottom: -10%;
      left: -5%;
      background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
    }

    /* ----------------------------------------------------
       ANIMATIONS
       ---------------------------------------------------- */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes toastInOut {
      0% { transform: translate(-50%, -50px); opacity: 0; }
      15% { transform: translate(-50%, 24px); opacity: 1; }
      85% { transform: translate(-50%, 24px); opacity: 1; }
      100% { transform: translate(-50%, -50px); opacity: 0; }
    }

    @keyframes cardPulse {
      0% { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px var(--panel-border); }
      50% { box-shadow: 0 4px 25px rgba(59,130,246,0.15), 0 0 8px 1px rgba(59,130,246,0.2); }
      100% { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px var(--panel-border); }
    }

    /* ----------------------------------------------------
       NOTIFICATIONS & TOASTS
       ---------------------------------------------------- */
    #toast-notification {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: #ffffff;
      padding: 14px 32px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
    }
    .show-toast { animation: toastInOut 3.5s ease-in-out forwards; }

    /* ----------------------------------------------------
       CUSTOM CONFIRMATION MODAL
       ---------------------------------------------------- */
    .vibe-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 8, 16, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 11000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .vibe-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .vibe-modal-card {
      background: var(--panel-bg);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-xl);
      padding: 32px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(239, 68, 68, 0.05);
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
    }
    .vibe-modal-overlay.active .vibe-modal-card {
      transform: translateY(0);
    }
    .vibe-modal-card h3 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #ffffff;
    }
    .vibe-modal-card p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .vibe-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* ----------------------------------------------------
       AUTH COMPONENT STYLING
       ---------------------------------------------------- */
    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .auth-header h2 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* ----------------------------------------------------
       UI REUSABLE STYLING (INPUTS, DROPDOWNS, BUTTONS)
       ---------------------------------------------------- */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      background-color: var(--input-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      transition: var(--transition-smooth);
    }

    input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }

    .stepper-container {
      display: flex;
      align-items: center;
      background-color: var(--input-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition-smooth);
    }
    .stepper-container:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .stepper-container input {
      border: none !important;
      background: transparent !important;
      margin-bottom: 0 !important;
      text-align: center;
      box-shadow: none !important;
    }
    .stepper-btn {
      background: rgba(255, 255, 255, 0.03);
      border: none;
      color: var(--text-secondary);
      width: 40px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: var(--transition-smooth);
    }
    .stepper-btn:hover {
      background: rgba(59, 130, 246, 0.15);
      color: #ffffff;
    }

    .vibe-dropdown {
      position: relative;
      width: 100%;
    }
    .vibe-dropdown-select {
      background-color: var(--input-bg);
      color: #ffffff;
      padding: 12px 16px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: var(--transition-smooth);
    }
    .vibe-dropdown-select:hover {
      border-color: rgba(255,255,255,0.2);
    }
    .vibe-dropdown-select::after {
      content: "";
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 5px solid var(--text-secondary);
      transition: transform 0.2s ease;
    }
    .vibe-dropdown.active .vibe-dropdown-select::after {
      transform: rotate(180deg);
    }
    .vibe-dropdown-options {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background-color: #0f172a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      z-index: 1000;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .vibe-dropdown-option {
      padding: 12px 16px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition-smooth);
    }
    .vibe-dropdown-option:hover {
      background-color: rgba(59, 130, 246, 0.15);
      color: #ffffff;
      padding-left: 20px;
    }
    .vibe-dropdown.active .vibe-dropdown-options {
      display: block;
      animation: fadeIn 0.15s ease-out;
    }

    button {
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }
    .primary-btn {
      background: linear-gradient(135deg, var(--accent-blue) 0%, #1d4ed8 100%);
      color: #ffffff;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
    }
    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }
    .secondary-btn {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--panel-border);
    }
    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255,255,255,0.2);
    }
    .danger-btn {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .danger-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* ----------------------------------------------------
       ANTI-JUMP CONTAINER LAYOUT SYSTEM
       ---------------------------------------------------- */
    .dashboard-wrapper {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 24px;
      animation: slideUp 0.5s ease-out forwards;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .top-nav h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .top-nav p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .toolbar-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: 1.5fr 1.2fr 2fr;
      gap: 20px;
      align-items: flex-end;
      backdrop-filter: blur(10px);
    }
    @media (max-width: 900px) {
      .toolbar-card { grid-template-columns: 1fr; }
    }

    .grid-layout {
      display: grid;
      grid-template-columns: 1.9fr 1.1fr;
      gap: 32px;
      align-items: start;
    }
    @media (max-width: 1024px) {
      .grid-layout { grid-template-columns: 1fr; }
    }

    .card-workspace-column {
      display: flex;
      flex-direction: column;
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 32px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: var(--transition-smooth);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .card-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.2px;
    }
    .toggle-icon {
      color: var(--text-dark);
      font-size: 13px;
      background: rgba(255,255,255,0.04);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      transition: var(--transition-smooth);
    }
    .card:hover .toggle-icon {
      color: var(--text-primary);
      background: rgba(255,255,255,0.08);
    }

    .card-content {
      margin-top: 24px;
      animation: fadeIn 0.3s ease-out;
    }
    .card.minimized { margin-bottom: 16px; }
    .card.minimized .card-content { display: none !important; }

    #category-rows-hook, #assignment-rows-hook {
      min-height: 50px;
      display: block;
      width: 100%;
    }

    /* Strict alignment grid to prevent sizing shifting */
    .row-item {
      display: grid;
      grid-template-columns: 2fr 1.5fr 44px;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
      animation: fadeIn 0.2s ease-out;
      width: 100%;
    }

    .row-item input {
      width: 100% !important;
      min-width: 0 !important; /* Permits compression into explicit track bounds */
      box-sizing: border-box;
      margin-bottom: 0;
    }

    /* Keeps side-by-side inputs locked regardless of numeric character counts */
    .score-split-container {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .score-split-container input {
      flex: 1 1 50%;
      min-width: 0 !important;
    }

    .remove-btn {
      background: transparent;
      color: var(--text-dark);
      font-size: 16px;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }
    .remove-btn:hover {
      color: var(--accent-danger);
      background: rgba(239, 68, 68, 0.1);
    }

    /* ----------------------------------------------------
       SUMMARY GRADE DISPLAY SIDEBAR
       ---------------------------------------------------- */
    .summary-card {
      text-align: center;
      background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 75%), #111827;
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 40px 24px;
      animation: cardPulse 8s infinite ease-in-out;
    }
    .summary-card span {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
    }
    .summary-card h1 {
      font-size: 64px;
      font-weight: 900;
      margin: 12px 0;
      letter-spacing: -2px;
      color: #ffffff;
    }
    .letter-grade {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-blue);
    }

    .scale-matrix-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .scale-matrix-grid div {
      background: rgba(13, 19, 33, 0.5);
      padding: 12px 8px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      text-align: center;
    }
    .scale-matrix-grid label {
      margin-bottom: 4px;
      color: var(--accent-blue);
      font-weight: 700;
    }
    .matrix-field-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .scale-matrix-grid input {
      background: transparent;
      border: none;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      width: 44px;
      padding: 2px;
    }
    .scale-matrix-grid input:focus { box-shadow: none; }
    .matrix-inline-btn {
      background: transparent;
      border: none;
      color: var(--text-dark);
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
    }
    .matrix-inline-btn:hover { color: #ffffff; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="toast-notification">Changes saved!</div>

  <div id="custom-confirm-modal" class="vibe-modal-overlay">
    <div class="vibe-modal-card">
      <h3 id="modal-title">Delete Class</h3>
      <p id="modal-description">Are you completely sure you want to remove this class?</p>
      <div class="vibe-modal-actions">
        <button class="secondary-btn" onclick="closeCustomVibeModal()">Cancel</button>
        <button class="primary-btn" id="modal-confirm-action-btn" style="background: linear-gradient(135deg, var(--accent-danger) 0%, #b91c1c 100%); box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);">Confirm Delete</button>
      </div>
    </div>
  </div>

  <div id="auth-view" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2 id="auth-title">Welcome</h2>
        <p>Sign in or create an account to start tracking grades</p>
      </div>
      <div id="auth-error" style="color: var(--accent-danger); font-weight: 600; font-size: 14px; text-align: center; margin-bottom: 16px;" class="hidden">An error occurred. Please check details and retry.</div>
      <form onsubmit="event.preventDefault(); runAuthSubmit();">
        <div style="margin-bottom: 16px;">
          <label>Email Address</label
